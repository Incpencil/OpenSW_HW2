# ============================================================
# CI/CD Pipeline: Build & Push Docker Image to Docker Hub
# ============================================================
# 필요한 GitHub Secrets:
#   - DOCKERHUB_USERNAME : Docker Hub 사용자 ID
#   - DOCKERHUB_TOKEN   : Docker Hub Access Token
# ============================================================

name: CI/CD - Docker Build & Push

on:
  push:
    branches: [ main ]
    paths-ignore:
      - '*.md'
      - 'docs/**'
  pull_request:
    branches: [ main ]

env:
  IMAGE_NAME: face-age-api

jobs:
  # ──────────────────────────────────────────────
  # Job 1: 코드 검증 (Lint + 구문 확인)
  # ──────────────────────────────────────────────
  lint:
    name: 🔍 Lint & Syntax Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Syntax check
        run: python -m py_compile app/main.py app/model.py app/download_models.py

  # ──────────────────────────────────────────────
  # Job 2: Docker 이미지 빌드 & Docker Hub 푸시
  # ──────────────────────────────────────────────
  build-and-push:
    name: 🐳 Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: lint
    # main 브랜치 push 시에만 Docker Hub에 푸시
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Docker Buildx 설정 (멀티 플랫폼 + 캐시 지원)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Docker Hub 로그인
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Docker 메타데이터 (태그 + 라벨 자동 생성)
      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}
          tags: |
            # latest 태그 (main 브랜치)
            type=raw,value=latest,enable={{is_default_branch}}
            # Git SHA 태그 (롤백용)
            type=sha,prefix=,format=short
            # 날짜 태그
            type=raw,value={{date 'YYYYMMDD'}},enable={{is_default_branch}}

      # 빌드 & 푸시 (BuildKit 레이어 캐시 활용)
      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # 푸시 결과 요약
      - name: Image digest
        run: echo "✅ Pushed image digest - ${{ steps.meta.outputs.digest }}"
